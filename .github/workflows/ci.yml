name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # sbt-dynver needs tags

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: sbt

      - uses: sbt/setup-sbt@v1

      # Mint an installation token that can read scala-lui from GitHub Packages.
      # The default GITHUB_TOKEN is scoped to this repo only and cannot read
      # packages owned by a sibling repo in the same org.
      - name: Mint cross-repo packages token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.LUI_READER_APP_ID }}
          private-key: ${{ secrets.LUI_READER_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            scala-lui

      - name: Compile shared + jvm + browser
        env:
          LUI_READ_ACTOR: trailbiomed-packages-bridge[bot]
          LUI_READ_TOKEN: ${{ steps.app-token.outputs.token }}
        run: sbt -J-Xmx3g "sharedJVM/compile" "sharedJS/compile" "browser/compile" "jvm/compile"

      - name: Link Scala.js bundle and run example
        env:
          LUI_READ_ACTOR: trailbiomed-packages-bridge[bot]
          LUI_READ_TOKEN: ${{ steps.app-token.outputs.token }}
        run: sbt -J-Xmx3g "browser/fullLinkJS" "example/run /tmp/sample-report.html"

      - name: Upload sample report
        uses: actions/upload-artifact@v4
        with:
          name: sample-report
          path: /tmp/sample-report.html
          if-no-files-found: warn
