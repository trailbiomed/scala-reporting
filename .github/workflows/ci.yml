name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read    # scala-lui packages are on GH Packages; the default token reads public-repo packages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # sbt-dynver needs tags

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Compile shared + jvm + browser
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sbt -J-Xmx3g "sharedJVM/compile" "sharedJS/compile" "browser/compile" "jvm/compile"

      - name: Link Scala.js bundle and run example
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sbt -J-Xmx3g "browser/fullLinkJS" "example/run /tmp/sample-report.html"

      - name: Upload sample report
        uses: actions/upload-artifact@v4
        with:
          name: sample-report
          path: /tmp/sample-report.html
          if-no-files-found: warn
