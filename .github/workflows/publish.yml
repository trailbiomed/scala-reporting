name: Publish

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # write scala-reporting + read scala-lui (public)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # sbt-dynver needs tags

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Show derived version
        run: sbt 'show ThisBuild / version'

      - name: Publish to Maven Central
        env:
          PGP_PASSPHRASE:    ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET:        ${{ secrets.PGP_SECRET }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sbt -J-Xmx3g ci-release

      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sbt -J-Xmx3g \
            'set ThisBuild / publishTo := Some("GitHub Package Registry" at "https://maven.pkg.github.com/trailbiomed/scala-reporting")' \
            'sharedJVM/publish' \
            'jvm/publish'
