name: Publish

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed by secrets.GITHUB_TOKEN to publish to this repo's packages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # sbt-dynver needs tags

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: sbt

      - uses: sbt/setup-sbt@v1

      # App installation token to READ scala-lui (sibling repo, same org).
      # The default GITHUB_TOKEN cannot read sibling-repo packages, and the App
      # token cannot WRITE to GitHub Packages Maven. The build wires them up
      # separately: LUI_READ_TOKEN → scala-lui resolver, GITHUB_TOKEN → publish.
      - name: Mint cross-repo read token (scala-lui)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.LUI_READER_APP_ID }}
          private-key: ${{ secrets.LUI_READER_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            scala-lui

      - name: Show derived version
        run: sbt 'show ThisBuild / version'

      - name: Publish sharedJVM + jvm (browser bundle included via resource gen)
        env:
          GITHUB_ACTOR:   ${{ github.actor }}
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          LUI_READ_ACTOR: trailbiomed-packages-bridge[bot]
          LUI_READ_TOKEN: ${{ steps.app-token.outputs.token }}
        run: sbt -J-Xmx3g "sharedJVM/publish" "jvm/publish"
