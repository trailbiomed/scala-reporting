name: Publish

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # sbt-dynver needs tags

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: sbt

      - uses: sbt/setup-sbt@v1

      # One token, two repos: read scala-lui (resolver) + write scala-reporting (publish).
      # Default GITHUB_TOKEN cannot read sibling-repo packages.
      - name: Mint cross-repo packages token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.LUI_READER_APP_ID }}
          private-key: ${{ secrets.LUI_READER_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            scala-lui
            scala-reporting

      - name: Show derived version
        run: sbt 'show ThisBuild / version'

      - name: Publish sharedJVM + jvm (browser bundle included via resource gen)
        env:
          GITHUB_ACTOR: trailbiomed-packages-bridge[bot]
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: sbt -J-Xmx3g "sharedJVM/publish" "jvm/publish"
